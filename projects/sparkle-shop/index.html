<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#533483">
  <title>Sparkle & Relativity — Shop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Nunito:wght@600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #1a1a2e radial-gradient(circle at 70% 10%, #533483, #1a1a2e 50%, #0d0d1a);
      color: #fff; min-height: 100vh; line-height: 1.5;
    }
    .sparkle-bar { height: 6px; background: linear-gradient(90deg,#ffd60a,#ff006e,#5ac8fa,#ffd60a); }
    header { text-align: center; padding: 28px 16px 12px; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif; font-size: clamp(1.8rem, 7vw, 2.8rem);
      background: linear-gradient(135deg,#ffd60a,#ff9ecd,#fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tagline { font-style: italic; color: #ff9ecd; font-size: 0.95rem; margin-top: 8px; max-width: 28rem; margin-inline: auto; }
    .quote {
      margin: 20px auto; max-width: 32rem; padding: 16px 20px; border-left: 4px solid #ffd60a;
      background: rgba(255,214,10,0.08); border-radius: 0 12px 12px 0; font-size: 0.92rem; color: #ffe8f0;
    }
    .grid { display: grid; gap: 14px; max-width: 36rem; margin: 0 auto; padding: 16px; }
    .product {
      background: rgba(255,255,255,0.06); border: 2px solid #533483; border-radius: 16px; padding: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .product h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: #ffd60a; }
    .price { font-size: 1.6rem; font-weight: 800; color: #ff9ecd; margin: 8px 0; }
    .pitch { font-size: 0.88rem; color: #ccc; margin-bottom: 12px; }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; }
    a.btn {
      display: inline-block; padding: 10px 16px; border-radius: 999px; text-decoration: none; font-weight: 800; font-size: 0.85rem;
    }
    .buy { background: #ffd60a; color: #1a1a2e; }
    .try { background: transparent; color: #ffd60a; border: 2px solid #ffd60a; }
    footer { text-align: center; padding: 24px; font-size: 0.75rem; color: #888; }
    footer a { color: #ff9ecd; }
  </style>
</head>
<body>
  <div class="sparkle-bar"></div>
  <header>
    <h1>Sparkle &amp; Relativity</h1>
    <p class="tagline">Einstein brains · Dolly heart · stuff you can actually sell</p>
  </header>
  <p class="quote">“Imagination is more important than knowledge, honey — and a little sparkle never hurt the equation.”</p>
  <div class="grid" id="grid"></div>
  <footer>
    Demo free · pay unlocks at <a href="/checkout">checkout</a> when Stripe lands ·
    <a href="/hope">Cards of Hope</a> · <a href="/k">George</a>
  </footer>
  <script>
    async function load() {
      const r = await fetch('products.json?' + Date.now());
      const d = await r.json();
      document.getElementById('grid').innerHTML = (d.products || []).map(p => `
        <article class="product">
          <h2>${p.name}</h2>
          <div class="price">$${p.price}</div>
          <p class="pitch">${p.pitch}</p>
          <div class="btns">
            <a class="btn buy" href="/checkout?sku=${encodeURIComponent(p.sku)}">Get it — $${p.price}</a>
            <a class="btn try" href="${p.url}">Try free</a>
          </div>
        </article>`).join('');
    }
    load();
  </script>
</body>
</html>
