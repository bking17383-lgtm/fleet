<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c1f3f">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.webmanifest">
<title>Gem GL</title>
<style>
  :root { --navy:#0c1f3f; --cream:#f5f0e6; --gold:#d4a84d; --green:#3ecf8e; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,sans-serif; background:var(--navy); color:var(--cream);
    padding:1.25rem 1rem 2rem; max-width:34rem; margin-inline:auto; min-height:100dvh;
    display:flex; flex-direction:column; justify-content:center; }
  .tag { color:var(--gold); font-size:.65rem; letter-spacing:.14em; text-transform:uppercase; }
  h1 { font-size:1.35rem; margin:.3rem 0 .5rem; }
  .pulse { width:72px; height:72px; border-radius:50%; margin:1rem auto;
    border:3px solid var(--green); display:flex; align-items:center; justify-content:center;
    font-size:1.8rem; }
  .pulse.on { animation:ring 1.5s ease-out infinite; background:rgba(62,207,142,.12); }
  @keyframes ring { 50% { box-shadow:0 0 0 12px rgba(62,207,142,.15); } }
  #status { text-align:center; font-size:1rem; margin:.5rem 0; min-height:1.4rem; }
  #status.good { color:var(--green); font-weight:700; }
  #status.wait { color:#8a9bb1; }
  .how { color:#8a9bb1; font-size:.8rem; line-height:1.5; margin:1rem 0; text-align:center; }
  .how strong { color:var(--cream); }
  button.arm { width:100%; padding:1rem; border:0; border-radius:12px; background:var(--gold);
    color:#0c1f3f; font-weight:800; font-size:1.05rem; margin-top:.5rem; }
  button.arm.hide { display:none; }
  a.tiny { display:block; text-align:center; color:#5a6f8f; font-size:.72rem; margin-top:1rem; }
  #log { font-size:.65rem; color:#5a6f8f; max-height:72px; overflow:auto; margin-top:.75rem; }
</style>
</head>
<body>
<p class="tag">Gem owns GL</p>
<h1 id="headline">Listening</h1>
<div class="pulse on" id="orb">👂</div>
<p id="status" class="wait">Arming…</p>
<p class="how" id="how">
  <strong>Live already open?</strong> Good — leave this tab open (split screen works).<br>
  When done: in Gemini tap <strong>Share</strong> → <strong>Gem GL</strong>. One tap. No paste.
</p>
<button type="button" class="arm" id="armBtn">Arm Gem ears</button>
<div id="log"></div>
<a class="tiny" href="https://gemini.google.com/app" target="_blank" rel="noopener">open Live if you need it</a>

<script>
const status = document.getElementById('status');
const log = document.getElementById('log');
const armBtn = document.getElementById('armBtn');
let last = localStorage.getItem('gem_gl_last') || '';
let busy = false;
let armed = localStorage.getItem('gem_gl_armed') === '1';

function line(m) {
  const d = document.createElement('div');
  d.textContent = new Date().toLocaleTimeString() + ' · ' + m;
  log.prepend(d);
}

async function ship(text, tag) {
  text = (text || '').trim();
  if (!text || text.length < 8 || text === last) return false;
  if (busy) return false;
  busy = true;
  status.textContent = 'Gem saving…';
  status.className = 'wait';
  try {
    const r = await fetch('/sink/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, tag: tag || 'auto' })
    });
    const d = await r.json();
    if (d.ok) {
      last = text;
      localStorage.setItem('gem_gl_last', text.slice(0, 4000));
      status.textContent = 'Gem got it ✓';
      status.className = 'good';
      document.getElementById('headline').textContent = 'Caught';
      line((d.path || '').split('/').pop() || 'saved');
      busy = false;
      return true;
    }
    status.textContent = 'Retry…';
    status.className = 'wait';
  } catch (_) {
    status.textContent = 'Offline — will retry';
    status.className = 'wait';
  }
  busy = false;
  return false;
}

async function ears() {
  if (!armed || !navigator.clipboard?.readText) return;
  try {
    const t = await navigator.clipboard.readText();
    if (t?.trim().length > 12) await ship(t.trim(), 'ears');
  } catch (_) {}
}

function goArm() {
  armed = true;
  localStorage.setItem('gem_gl_armed', '1');
  armBtn.classList.add('hide');
  status.textContent = 'Listening — Share from Gemini or flip back here';
  status.className = 'wait';
  line('ears armed');
  ears();
  if ('wakeLock' in navigator) navigator.wakeLock.request().catch(() => {});
}

armBtn.onclick = goArm;
if (armed) { armBtn.classList.add('hide'); status.textContent = 'Listening'; }

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { setTimeout(ears, 100); setTimeout(ears, 600); }
});
window.addEventListener('focus', () => setTimeout(ears, 100));
window.addEventListener('pageshow', () => setTimeout(ears, 200));
setInterval(ears, 900);

if (armed) goArm(); else { status.textContent = 'Tap once — then automatic'; }
</script>
</body>
</html>
