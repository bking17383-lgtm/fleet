<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#2d6a1f">
  <title>WED BED DEAD — HasBeen Heroes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Comic Neue', 'Comic Sans MS', cursive;
      background: #1a0a2e radial-gradient(circle at 20% 10%, #3d1a6e, #1a0a2e 50%, #0d0500);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .slime-top {
      height: 12px;
      background: repeating-linear-gradient(90deg, #5cdb3a, #2d8a1f 8px, #7fff4a 16px);
      box-shadow: 0 4px 20px #5cdb3a88;
    }

    header {
      text-align: center;
      padding: 16px 12px 8px;
    }
    h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(2.2rem, 9vw, 3.8rem);
      letter-spacing: 0.06em;
      color: #ff3d9a;
      text-shadow: 3px 3px 0 #000, -1px -1px 0 #ffe600, 0 0 30px #ff3d9a88;
      transform: rotate(-2deg);
    }
    .sub {
      font-size: 0.85rem;
      color: #b8ff6a;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 12px;
    }
    button {
      font-family: 'Bangers', cursive;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      padding: 10px 18px;
      border: 3px solid #000;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.1s;
    }
    button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
    .btn-deal { background: #ffe600; color: #000; }
    .btn-mode { background: #ff3d9a; color: #fff; }

    .zones {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 10px 12px;
      max-width: 700px;
      margin: 0 auto;
    }
    .zone {
      min-height: 90px;
      border: 3px dashed #ffffff44;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      transition: background 0.2s, border-color 0.2s;
    }
    .zone.over { background: #ffffff15; border-color: #ffe600; }
    .zone.wed { border-color: #ff69b4; }
    .zone.bed { border-color: #ff3d9a; }
    .zone.dead { border-color: #666; }
    .zone-label {
      font-family: 'Bangers', cursive;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
    }
    .zone.wed .zone-label { color: #ff69b4; }
    .zone.bed .zone-label { color: #ff3d9a; }
    .zone.dead .zone-label { color: #aaa; }
    .zone-hint { font-size: 0.65rem; opacity: 0.6; margin-top: 2px; }

    .hand {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      padding: 16px 10px 24px;
      perspective: 800px;
    }

    .card {
      width: min(168px, 30vw);
      aspect-ratio: 2.5/3.5;
      background: #f5e6c8;
      border: 4px solid #000;
      border-radius: 10px;
      box-shadow: 6px 6px 0 #000, inset 0 0 0 3px #fff;
      cursor: grab;
      position: relative;
      transform: rotate(var(--rot, 0deg));
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
      touch-action: none;
    }
    .card:hover { transform: rotate(0deg) scale(1.04); z-index: 5; }
    .card.dragging { opacity: 0.5; cursor: grabbing; }
    .card.placed { width: 100%; max-width: 100px; cursor: default; }
    .card.placed:hover { transform: none; }

    .card-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 6px;
      overflow: hidden;
    }

    .card-num {
      position: absolute;
      top: 4px; left: 6px;
      font-family: 'Bangers', cursive;
      font-size: 0.75rem;
      color: #000;
      background: #ffe600;
      border: 2px solid #000;
      padding: 0 4px;
      border-radius: 4px;
    }

    .rarity {
      position: absolute;
      top: 4px; right: 4px;
      font-size: 0.55rem;
      font-weight: bold;
      text-transform: uppercase;
      padding: 2px 4px;
      border: 2px solid #000;
      border-radius: 4px;
    }
    .rarity.legend { background: gold; color: #000; }
    .rarity.cult { background: #9b59b6; color: #fff; }
    .rarity.common { background: #ccc; color: #000; }
    .rarity.retired { background: #444; color: #888; }

    .card-art {
      flex: 1;
      margin-top: 18px;
      border: 3px solid #000;
      border-radius: 6px;
      background: linear-gradient(145deg, var(--c1, #5cdb3a), var(--c2, #2d6a1f));
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-end;
      padding: 0;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-height: 88px;
    }
    .card-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      image-rendering: auto;
    }
    .card-photo-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #e8d5b0;
    }
    .card-art::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(circle at 12% 88%, rgba(92,219,58,.35) 0 6px, transparent 7px);
      opacity: 0.7;
    }
    .card-art::after {
      content: '';
      position: absolute;
      bottom: 3px;
      right: 6px;
      width: 14px;
      height: 16px;
      z-index: 4;
      background: #5cdb3a;
      border: 2px solid #000;
      border-radius: 45% 55% 40% 60%;
      opacity: 0.9;
      pointer-events: none;
    }
    .card-art-overlay {
      position: relative;
      z-index: 3;
      padding: 4px 5px 6px;
      background: linear-gradient(transparent 0%, rgba(0,0,0,.55) 35%, rgba(0,0,0,.88) 100%);
      margin-top: auto;
    }
    .gpk-face {
      font-family: 'Bangers', cursive;
      font-size: 0.82rem;
      line-height: 1.05;
      color: #ffe600;
      text-shadow: 2px 2px 0 #000, -1px 0 #ff3d9a;
      z-index: 1;
    }
    .card-source {
      font-size: 0.55rem;
      color: #e8ffe0;
      margin-top: 2px;
      font-weight: bold;
      z-index: 1;
      text-shadow: 1px 1px 0 #000;
    }

    .card-foot {
      margin-top: 4px;
      border-top: 2px solid #000;
      padding-top: 4px;
    }
    .tagline {
      font-size: 0.55rem;
      color: #222;
      line-height: 1.2;
      font-style: italic;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 3px;
      font-size: 0.5rem;
      color: #000;
      font-weight: bold;
    }
    .stat-bar {
      background: #ddd;
      border: 1px solid #000;
      height: 6px;
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-fill {
      height: 100%;
      background: linear-gradient(90deg, #5cdb3a, #ff3d9a);
    }

    .explain {
      max-width: 600px;
      margin: 0 auto 20px;
      padding: 0 14px;
      display: none;
    }
    .explain.show { display: block; }
    .explain h3 {
      font-family: 'Bangers', cursive;
      color: #ffe600;
      margin-bottom: 8px;
    }
    .explain textarea {
      width: 100%;
      min-height: 70px;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px;
      border: 3px solid #000;
      border-radius: 8px;
      background: #fff8e0;
      margin-bottom: 8px;
    }
    .verdict {
      max-width: 600px;
      margin: 0 auto 30px;
      padding: 14px;
      background: #00000088;
      border: 3px solid #5cdb3a;
      border-radius: 12px;
      display: none;
    }
    .verdict.show { display: block; }
    .verdict pre {
      white-space: pre-wrap;
      font-family: inherit;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.7rem;
      color: #888;
      border-top: 3px solid #5cdb3a44;
    }
    footer a { color: #b8ff6a; }

    @keyframes dealIn {
      from { opacity: 0; transform: translateY(-40px) rotate(10deg); }
      to { opacity: 1; transform: translateY(0) rotate(var(--rot, 0deg)); }
    }
    .card.deal-in { animation: dealIn 0.5s ease backwards; }
    .card.deal-in:nth-child(2) { animation-delay: 0.15s; }
    .card.deal-in:nth-child(3) { animation-delay: 0.3s; }

    .flip-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #b8ff6a99;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="slime-top"></div>
  <header>
    <h1>WED · BED · DEAD</h1>
    <p class="sub">HasBeen Heroes Edition · 3 cards · defend your sins</p>
  </header>

  <div class="controls">
    <button class="btn-deal" onclick="deal()">🎴 DEAL NEW HAND</button>
    <button class="btn-mode" onclick="toggleMode()" id="modeBtn">MODE: FAIR (3 ERAS)</button>
  </div>

  <div class="zones">
    <div class="zone wed" data-slot="wed" ondragover="allowDrop(event)" ondrop="drop(event)">
      <span class="zone-label">WED</span>
      <span class="zone-hint">ring & regret</span>
    </div>
    <div class="zone bed" data-slot="bed" ondragover="allowDrop(event)" ondrop="drop(event)">
      <span class="zone-label">BED</span>
      <span class="zone-hint">one night only</span>
    </div>
    <div class="zone dead" data-slot="dead" ondragover="allowDrop(event)" ondrop="drop(event)">
      <span class="zone-label">DEAD</span>
      <span class="zone-hint">gone. good.</span>
    </div>
  </div>

  <p class="flip-hint">tap card for back · drag to a zone</p>
  <div class="hand" id="hand"></div>

  <div class="explain" id="explain">
    <h3>DEFEND YOUR CHOICES (required for shame)</h3>
    <div id="explainFields"></div>
    <button class="btn-deal" onclick="submitChoices()">SEAL MY FATE</button>
  </div>

  <div class="verdict" id="verdict"></div>

  <footer>
    Bunny Lab · stratified random across decades · <a href="/bunny/">← lab</a>
  </footer>

  <script>
    let deck = [];
    let hand = [];
    let assignments = { wed: null, bed: null, dead: null };
    let fairMode = true;
    let usedIds = new Set();
    const COLORS = [
      ['#ff6b6b','#c0392b'], ['#5cdb3a','#1e6b1e'], ['#74b9ff','#0984e3'],
      ['#fdcb6e','#e17055'], ['#a29bfe','#6c5ce7'], ['#ff9ff3','#f368e0'],
    ];

    async function loadDeck() {
      const r = await fetch('deck.json?' + Date.now());
      const d = await r.json();
      deck = (d.cards || []).filter(c => !c.disabled);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickFairThree() {
      const eras = [...new Set(deck.map(c => c.era))];
      const pickedEras = shuffle(eras).slice(0, 3);
      const out = [];
      for (const era of pickedEras) {
        const pool = deck.filter(c => c.era === era && !usedIds.has(c.id));
        if (!pool.length) continue;
        const card = pool[Math.floor(Math.random() * pool.length)];
        out.push(card);
        usedIds.add(card.id);
      }
      while (out.length < 3) {
        const pool = deck.filter(c => !usedIds.has(c.id));
        if (!pool.length) { usedIds.clear(); continue; }
        const card = pool[Math.floor(Math.random() * pool.length)];
        out.push(card);
        usedIds.add(card.id);
      }
      return out.slice(0, 3);
    }

    function pickChaosThree() {
      const pool = deck.filter(c => !usedIds.has(c.id));
      if (pool.length < 3) usedIds.clear();
      return shuffle(deck.filter(c => !usedIds.has(c.id))).slice(0, 3).map(c => {
        usedIds.add(c.id);
        return c;
      });
    }

    function statBar(val) {
      return `<div class="stat-bar"><div class="stat-fill" style="width:${val}%"></div></div>`;
    }

    function cardArtSrc(card) {
      return card.cartoon || 'art/placeholder.svg';
    }

    function photoWrapHtml(card) {
      const src = cardArtSrc(card);
      return `<div class="card-photo-wrap">
        <img class="card-photo" src="${esc(src)}" alt="${esc(card.gpk_name)}" loading="lazy">
      </div>`;
    }

    function cardFrontHtml(card) {
      const labels = card.tier === 'star'
        ? `<div class="gpk-face">${esc(card.gpk_name)}</div><div class="card-source">as ${esc(card.role)}</div>`
        : `<div class="gpk-face">${esc(card.gpk_name)}</div><div class="card-source">${esc(card.source)}</div>`;
      return `${photoWrapHtml(card)}<div class="card-art-overlay">${labels}</div>`;
    }

    function cardBackHtml(card) {
      return `${photoWrapHtml(card)}<div class="card-art-overlay">
        <div class="gpk-face" style="font-size:0.75rem">WHO?</div>
        <div class="card-source">${esc(card.real_name)}</div>
        <div class="tagline" style="margin-top:4px;font-size:0.5rem;color:#b8ff6a">${esc(card.gag)}</div>
      </div>`;
    }

    function renderCard(card, idx, inZone = false) {
      const [c1, c2] = COLORS[idx % COLORS.length];
      const rot = (Math.random() * 8 - 4).toFixed(1);
      const s = card.stats;
      return `
        <div class="card ${inZone ? 'placed' : 'deal-in'}" draggable="${!inZone}"
             style="--rot:${rot}deg; --c1:${c1}; --c2:${c2}"
             data-id="${card.id}" ondragstart="drag(event)"
             onclick="flipCard(this, ${JSON.stringify(card).replace(/"/g, '&quot;')})">
          <span class="card-num">#${String(idx + 1).padStart(3,'0')}</span>
          <span class="rarity ${card.rarity}">${card.rarity}</span>
          <div class="card-inner">
            <div class="card-art">${cardFrontHtml(card)}</div>
            <div class="card-foot">
              <div class="tagline">${esc(card.tagline)}</div>
              <div class="stats">
                <span>GRS${statBar(s.gross)}</span>
                <span>WIT${statBar(s.wit)}</span>
                <span>STN${statBar(s.stench)}</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function flipCard(el, card) {
      if (el.classList.contains('placed')) return;
      const art = el.querySelector('.card-art');
      const foot = el.querySelector('.card-foot');
      if (el.dataset.flipped) {
        el.dataset.flipped = '';
        art.innerHTML = cardFrontHtml(card);
        foot.style.display = '';
      } else {
        el.dataset.flipped = '1';
        art.innerHTML = cardBackHtml(card);
        foot.style.display = 'none';
      }
    }

    function deal() {
      assignments = { wed: null, bed: null, dead: null };
      document.getElementById('explain').classList.remove('show');
      document.getElementById('verdict').classList.remove('show');
      document.querySelectorAll('.zone').forEach(z => {
        z.querySelectorAll('.card').forEach(c => c.remove());
      });
      hand = fairMode ? pickFairThree() : pickChaosThree();
      const el = document.getElementById('hand');
      el.innerHTML = hand.map((c, i) => renderCard(c, i)).join('');
    }

    function toggleMode() {
      fairMode = !fairMode;
      document.getElementById('modeBtn').textContent =
        fairMode ? 'MODE: FAIR (3 ERAS)' : 'MODE: CHAOS';
    }

    function allowDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.add('over');
    }

    function drag(e) {
      e.dataTransfer.setData('text/plain', e.target.dataset.id);
      e.target.classList.add('dragging');
    }

    function drop(e) {
      e.preventDefault();
      const zone = e.currentTarget;
      zone.classList.remove('over');
      const id = e.dataTransfer.getData('text/plain');
      const card = hand.find(c => c.id === id);
      if (!card) return;
      const slot = zone.dataset.slot;
      if (assignments[slot]) {
        const old = assignments[slot];
        document.getElementById('hand').appendChild(
          document.querySelector(`.card[data-id="${old.id}"]`) ||
          createPlacedCardBack(old)
        );
      }
      assignments[slot] = card;
      hand = hand.filter(c => c.id !== id);
      const cardEl = document.querySelector(`.card[data-id="${id}"]`);
      if (cardEl) {
        cardEl.classList.remove('dragging');
        cardEl.classList.add('placed');
        cardEl.draggable = false;
        zone.appendChild(cardEl);
      }
      checkReady();
    }

    document.addEventListener('dragleave', e => {
      if (e.target.classList?.contains('zone')) e.target.classList.remove('over');
    });

    function checkReady() {
      if (assignments.wed && assignments.bed && assignments.dead) {
        const ef = document.getElementById('explainFields');
        ef.innerHTML = ['wed','bed','dead'].map(slot => {
          const c = assignments[slot];
          const label = slot.toUpperCase();
          return `<label style="display:block;margin-bottom:8px;color:#b8ff6a;font-size:0.8rem">
            Why ${label} ${esc(c.gpk_name)}?
            <textarea id="why-${slot}" placeholder="Because..."></textarea></label>`;
        }).join('');
        document.getElementById('explain').classList.add('show');
      }
    }

    function submitChoices() {
      const lines = ['☣ YOUR WED BED DEAD CERTIFICATE ☣', ''];
      for (const slot of ['wed','bed','dead']) {
        const c = assignments[slot];
        const why = document.getElementById('why-' + slot)?.value.trim() || '(no excuse given — coward)';
        lines.push(`${slot.toUpperCase()}: ${c.gpk_name} — ${c.source}`);
        lines.push(`  → ${why}`);
        lines.push('');
      }
      const v = document.getElementById('verdict');
      v.innerHTML = '<pre>' + esc(lines.join('\n')) + '</pre>';
      v.classList.add('show');
      v.scrollIntoView({ behavior: 'smooth' });
    }

    document.addEventListener('dragend', e => {
      e.target.classList?.remove('dragging');
    });

    // touch drag fallback — tap zone buttons would be v2; drag works on desktop

    loadDeck().then(deal);
  </script>
</body>
</html>
