<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Desk — Gem + Bunny</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Georgia, serif;
      background: #1a1208; color: #f5e6c8; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .desk-head {
      flex-shrink: 0; z-index: 10;
      background: #2d1f0f; border-bottom: 2px solid #ca8a04;
      padding: 10px 16px 12px;
    }
    h1 { margin: 0; font-size: 1.4rem; color: #fcd34d; }
    .sub { color: #c4a574; font-size: 0.95rem; margin: 4px 0 8px; }
    #brianbanner { margin: 4px 0; font-size: 0.9rem; max-height: 2.8em; overflow: hidden; }
    #brianbanner .block { color: #fca5a5; }
    #brianbanner .wait { color: #fcd34d; }
    #brianbanner .ok { color: #86efac; }
    textarea {
      width: 100%; min-height: 64px; max-height: 96px; font-size: 1.1rem;
      border-radius: 10px; border: 1px solid #5c4a2a;
      background: #0f0a04; color: #f5e6c8; padding: 10px;
    }
    button {
      margin-top: 8px; padding: 12px 16px; width: 100%;
      border: none; border-radius: 10px; background: #ca8a04;
      color: #1a1208; font-weight: 800; font-size: 1rem; cursor: pointer;
    }
    .desk-body { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 16px 24px; }
    .agent-table { width: 100%; border-collapse: collapse; font-size: 1.15rem; }
    .agent-table th, .agent-table td {
      border: 1px solid #5c4a2a; padding: 10px 8px; vertical-align: top;
    }
    .agent-table th { background: #2d1f0f; color: #fcd34d; }
    .name { color: #fde68a; font-weight: 700; font-size: 1.3rem; }
    .lane { color: #c4a574; font-size: 0.9rem; }
    .status-ok { color: #86efac; }
    .status-wait { color: #fcd34d; }
    .status-block { color: #fca5a5; }
    .slave-live { color: #86efac; font-weight: 700; }
    .slave-quiet { color: #fca5a5; font-weight: 700; }
    .voice-row { margin-top: 10px; font-size: 0.95rem; }
    .voice-on { background: #166534 !important; color: #dcfce7 !important; }
    .ok { color: #86efac; }
    .bad { color: #fca5a5; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .links a { color: #fde68a; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="desk-head">
    <h1>Team Desk</h1>
    <p class="sub">Whole team · drop stays on screen · Gem + Bunny loop</p>
    <div id="brianbanner"></div>
    <textarea id="note" placeholder="Type here — Enter sends · team: gem: cpt: desk ask:"></textarea>
    <button onclick="drop()">Send to Bunny</button>
    <div id="dropmsg"></div>
    <div class="voice-row">
      <details>
        <summary style="cursor:pointer;color:#fde68a">Voice (optional — type is primary)</summary>
        <button id="voicebtn" onclick="toggleVoice()" style="width:auto;display:inline-block;margin-top:6px">Start voice</button>
        <span id="voicemsg"></span>
        <span id="voiceline" style="color:#fde68a;margin-left:8px"></span>
      </details>
    </div>
    <div class="links">
      <a href="/bunny/">Bunny Lab</a>
      <a href="/gemini/">GL local</a>
      <a href="http://192.168.1.4/bunny/">puppy LAN</a>
    </div>
  </div>
  <div class="desk-body">
    <div id="agentwrap">loading team…</div>
  </div>
  <script>
    const API = '/bunny-api';
    async function drop() {
      const text = document.getElementById('note').value.trim();
      const el = document.getElementById('dropmsg');
      if (!text) return;
      const prefix = text.toLowerCase().startsWith('desk') ? '' : 'TEAM_DESK — ';
      try {
        const r = await fetch(API + '/drop', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({text: prefix + text})
        });
        const d = await r.json();
        el.innerHTML = d.ok ? '<span class="ok">sent</span>' : '<span class="bad">fail</span>';
        if (d.ok) { document.getElementById('note').value = ''; loadAgents(); }
      } catch (e) { el.innerHTML = '<span class="bad">offline</span>'; }
    }
    document.getElementById('note').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); drop(); }
    });

    function renderBanner(banners) {
      const el = document.getElementById('brianbanner');
      if (!banners || !banners.length) { el.innerHTML = ''; return; }
      el.innerHTML = banners.map(b => `<div class="${b.level}">• ${b.text}</div>`).join('');
    }

    async function loadAgents() {
      const el = document.getElementById('agentwrap');
      try {
        const r = await fetch(API + '/agent-table?' + Date.now());
        const d = await r.json();
        renderBanner(d.brian_banner);
        const sc = s => {
          const t = (s||'').toLowerCase();
          if (t.includes('ok') || t === 'up' || t === 'live' || t === 'working') return 'status-ok';
          if (t.includes('block') || t === 'quiet') return 'status-block';
          return 'status-wait';
        };
        const sl = s => s === 'live' ? 'slave-live' : (s === 'quiet' ? 'slave-quiet' : 'status-wait');
        const jobs = (d.open_jobs||[]).filter(j => j.status === 'open');
        el.innerHTML = `<table class="agent-table"><thead><tr>
          <th>Who</th><th>Doing</th><th>Slave</th><th>Status</th>
        </tr></thead><tbody>` + (d.rows||[]).map(row => `<tr>
          <td><div class="name">${row.agent}</div><div class="lane">${row.lane||''}</div></td>
          <td>${row.doing||''}</td>
          <td class="${sl(row.slave)}">${row.slave||'?'}</td>
          <td class="${sc(row.status)}">${row.status||'?'}</td>
        </tr>`).join('') + `</tbody></table>` +
        (jobs.length ? `<p class="sub" style="margin-top:12px"><strong>Open jobs:</strong> ${jobs.map(j=>j.text).join(' · ')}</p>` : '');
      } catch (e) { el.innerHTML = '<span class="bad">team offline — check puppy API</span>'; }
    }
    loadAgents();
    setInterval(loadAgents, 15000);

    let recognition, voiceOn = false, voiceWanted = false;
    const WAKE = /\b(bunny|bunnie)\b/i;
    function toggleVoice() {
      if (voiceOn) { voiceWanted = false; try { recognition.stop(); } catch(e){} voiceOn = false;
        document.getElementById('voicebtn').textContent = 'Voice (optional)'; return; }
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) { document.getElementById('voicemsg').innerHTML = '<span class="bad">no mic API — use typing</span>'; return; }
      voiceWanted = true;
      recognition = new Speech();
      recognition.continuous = true; recognition.lang = 'en-US';
      recognition.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (!e.results[i].isFinal) continue;
          const t = e.results[i][0].transcript.trim();
          document.getElementById('voiceline').textContent = t;
          if (WAKE.test(t)) {
            const note = t.replace(/^\s*((hey\s+)?(ok\s+)?)bunn(y|ie)[,:\s]*/i, '').trim();
            if (note) {
              document.getElementById('note').value = note;
              drop();
            }
          }
        }
      };
      recognition.onerror = () => { document.getElementById('voicemsg').innerHTML = '<span class="bad">mic blocked — type instead</span>'; };
      recognition.start(); voiceOn = true;
      document.getElementById('voicebtn').textContent = 'Pause voice';
      document.getElementById('voicebtn').classList.add('voice-on');
      document.getElementById('voicemsg').innerHTML = '<span class="ok">say bunny + note</span>';
    }
  </script>
</body>
</html>
