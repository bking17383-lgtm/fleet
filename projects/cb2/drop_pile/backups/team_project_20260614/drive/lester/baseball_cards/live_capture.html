<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c1f3f">
  <title>Live capture — Baseball Cards</title>
  <style>
    :root {
      --navy: #0c1f3f; --cream: #f5f0e6; --gold: #d4a84d;
      --red: #c41e3a; --success: #3ecf8e; --muted: #8a9bb1; --border: #2a3f5f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, sans-serif;
      background: var(--navy); color: var(--cream);
      padding: 0.75rem; padding-bottom: 2rem;
    }
    h1 { font-size: 1rem; margin: 0 0 0.25rem; }
    .sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.75rem; }
    .panel {
      background: #132a4f; border: 1px solid var(--border);
      border-radius: 12px; padding: 0.65rem; margin-bottom: 0.65rem;
    }
    .panel h2 { font-size: 0.68rem; color: var(--gold); text-transform: uppercase; margin: 0 0 0.4rem; }
    .zones { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .zone {
      border: 2px dashed var(--border); border-radius: 10px; min-height: 110px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; color: var(--muted); cursor: pointer; position: relative; overflow: hidden;
    }
    .zone.has-img { border-style: solid; }
    .zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .zone.locked { opacity: 0.45; pointer-events: none; }
    button {
      border: none; border-radius: 10px; padding: 0.7rem; font-weight: 600;
      font-size: 0.85rem; width: 100%; margin-top: 0.45rem; cursor: pointer;
    }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-secondary { background: transparent; color: var(--cream); border: 1px solid var(--border); }
    .warn { color: #ff8a8a; font-size: 0.72rem; margin: 0.35rem 0; }
    .ok { color: var(--success); font-size: 0.72rem; }
    pre.cheats {
      font-size: 0.62rem; line-height: 1.35; white-space: pre-wrap;
      color: var(--muted); max-height: 120px; overflow-y: auto;
    }
    .badge { font-size: 0.62rem; background: rgba(212,168,75,0.15); color: var(--gold);
      padding: 0.15rem 0.4rem; border-radius: 4px; display: inline-block; margin-bottom: 0.35rem; }
  </style>
</head>
<body>
  <span class="badge">Baseball card scan · NOT general Live</span>
  <h1 id="cardTitle">Loading card…</h1>
  <p class="sub" id="cardSub"></p>

  <div class="panel">
    <h2>Gemini Live — this card only</h2>
    <p style="font-size:0.65rem;color:var(--gold);margin-bottom:0.35rem;">Feed <code>system_instruction</code> into Live session (camera coach, not general chat).</p>
    <pre class="cheats" id="cheatText">…</pre>
  </div>

  <div class="panel">
    <h2>1 · Capture</h2>
    <div class="zones">
      <div class="zone" id="zoneFront">📷 Front</div>
      <div class="zone locked" id="zoneBack">📷 Back</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
    <p id="gateMsg" class="warn" hidden></p>
    <button type="button" class="btn-secondary" id="gateBtn" disabled>Check photo quality (gate)</button>
  </div>

  <div class="panel" id="gradePanel" hidden>
    <h2>2 · Grade (Flask + CollX)</h2>
    <p class="sub" id="gradeStatus">Waiting for Gemini Live grade report…</p>
    <button type="button" class="btn-primary" id="gradeBtn">Send practice grade to Flask</button>
    <button type="button" class="btn-secondary" id="doneBtn" hidden>Back to app with results</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const cardId = params.get('card_id') || '';
    let cardData = null;
    let cheats = null;
    let gateToken = null;
    let uploadSide = 'front';
    let frontOk = false;
    let backOk = false;

    /** Hooks for puppy Gemini Live — same origin or postMessage parent */
    window.BaseballScan = {
      getCardId: () => cardId,
      getCheats: () => cheats,
      postGate: (payload) => postGate({ ...payload, card_id: cardId, source: payload.source || 'gemini_live' }),
      postGrade: (liveReport) => postGrade(liveReport),
    };

    async function loadContext() {
      if (!cardId) {
        document.getElementById('cardTitle').textContent = 'No card selected';
        return;
      }
      const res = await fetch(`/api/scan/context/${cardId}`);
      const data = await res.json();
      if (data.status !== 'ok') {
        document.getElementById('cardTitle').textContent = data.message || 'Error';
        return;
      }
      cardData = data.card;
      cheats = data.lester_cheats;
      const c = cardData;
      document.getElementById('cardTitle').textContent = `${c.player} (${c.year})`;
      const mid = c.valuation?.estimate_mid;
      document.getElementById('cardSub').textContent =
        `${c.set}${c.card_number ? ' #' + c.card_number : ''}` +
        (mid != null ? ` · CollX $${mid.toFixed(2)}` : '');
      document.getElementById('cheatText').textContent = cheats.system_instruction || cheats.prompt || '';
      if (!cheats.top_tier) {
        document.getElementById('zoneBack').classList.remove('locked');
      }
    }

    document.getElementById('zoneFront').onclick = () => { uploadSide = 'front'; document.getElementById('fileInput').click(); };
    document.getElementById('zoneBack').onclick = () => {
      if (document.getElementById('zoneBack').classList.contains('locked')) return;
      uploadSide = 'back';
      document.getElementById('fileInput').click();
    };

    document.getElementById('fileInput').onchange = () => {
      const f = document.getElementById('fileInput').files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = e => {
        const url = e.target.result;
        const el = uploadSide === 'front' ? document.getElementById('zoneFront') : document.getElementById('zoneBack');
        el.classList.add('has-img');
        el.innerHTML = `<img src="${url}" alt="">`;
        if (uploadSide === 'front') {
          frontOk = true;
          if (cheats?.top_tier) document.getElementById('zoneBack').classList.remove('locked');
        } else {
          backOk = true;
        }
        document.getElementById('gateBtn').disabled = false;
      };
      reader.readAsDataURL(f);
      document.getElementById('fileInput').value = '';
    };

    async function postGate(payload) {
      const res = await fetch('/api/scan/gate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      const msg = document.getElementById('gateMsg');
      if (data.status === 'ok') {
        gateToken = data.gate_token;
        msg.className = 'ok';
        msg.textContent = data.message || 'Gate passed';
        msg.hidden = false;
        document.getElementById('gradePanel').hidden = false;
        return data;
      }
      msg.className = 'warn';
      msg.textContent = data.message || data.gate?.message || 'Gate blocked';
      msg.hidden = false;
      return data;
    }

    document.getElementById('gateBtn').onclick = () => postGate({
      front_ok: frontOk,
      back_ok: backOk,
      blur: false,
      glare: false,
      source: 'live_capture',
    });

    async function postGrade(liveReport) {
      const res = await fetch('/api/scan/grade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          card_id: cardId,
          gate_token: gateToken,
          live_report: liveReport,
        }),
      });
      const data = await res.json();
      if (data.status === 'success') {
        sessionStorage.setItem('baseball_scan_result', JSON.stringify(data));
        document.getElementById('gradeStatus').textContent =
          `${data.grade_label} · ${data.confidence}% · ${data.valuation?.route?.label || ''}`;
        document.getElementById('doneBtn').hidden = false;
        return data;
      }
      document.getElementById('gradeStatus').textContent = data.message || 'Grade failed';
      return data;
    }

    document.getElementById('gradeBtn').onclick = () => postGrade({
      grade: 7,
      confidence: 84,
      centering: '55/45 H',
      corners: 'Minor soft (-1)',
      edges: 'Clean',
      surface: 'Standard luster',
      source: 'practice_until_gemini_live',
    });

    document.getElementById('doneBtn').onclick = () => { location.href = '/'; };

    loadContext();
  </script>
</body>
</html>
