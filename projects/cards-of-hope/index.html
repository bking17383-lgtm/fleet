<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#1f6fb2">
  <title>Cards of Hope</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #0c2a4a radial-gradient(circle at 25% 8%, #2a6db0, #0c2a4a 55%, #07172b);
      color: #fff; min-height: 100vh; overflow-x: hidden;
    }
    .ray-top { height: 10px; background: repeating-linear-gradient(90deg,#ffd23f,#ff9e1f 8px,#ffe88a 16px); box-shadow: 0 4px 22px #ffd23f88; }
    header { text-align: center; padding: 18px 12px 6px; }
    h1 {
      font-family: 'Bangers', cursive; font-size: clamp(2.4rem, 10vw, 4rem); letter-spacing: 0.05em;
      color: #ffd23f; text-shadow: 3px 3px 0 #07172b, 0 0 28px #ffd23f66;
    }
    .sub { font-size: 0.82rem; color: #bfe3ff; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.2em; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 12px; }
    button {
      font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 0.05em; padding: 10px 18px;
      border: 3px solid #07172b; border-radius: 10px; cursor: pointer; box-shadow: 4px 4px 0 #07172b; transition: transform .1s;
    }
    button:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #07172b; }
    .btn-deal { background: #ffd23f; color: #07172b; }
    .flip-hint { text-align: center; font-size: 0.78rem; color: #bfe3ff99; padding-bottom: 6px; }
    .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 14px 10px 28px; perspective: 900px; }
    .card {
      width: min(190px, 42vw); aspect-ratio: 2.5/3.5; background: #fff8ec; border: 4px solid #07172b; border-radius: 12px;
      box-shadow: 6px 6px 0 #07172b, inset 0 0 0 3px #fff; cursor: pointer; position: relative;
      transform: rotate(var(--rot,0deg)); transition: transform .2s, box-shadow .2s; user-select: none;
    }
    .card:hover { transform: rotate(0deg) scale(1.04); z-index: 5; }
    .card-num { position: absolute; top: 5px; left: 7px; font-family:'Bangers',cursive; font-size:.75rem; color:#07172b; background:#ffd23f; border:2px solid #07172b; padding:0 5px; border-radius:5px; z-index: 6; }
    .rarity { position: absolute; top: 5px; right: 5px; font-size:.55rem; font-weight:800; text-transform:uppercase; padding:2px 5px; border:2px solid #07172b; border-radius:5px; z-index:6; }
    .rarity.legend { background:#ffd23f; color:#07172b; } .rarity.cult { background:#5ac8fa; color:#07172b; } .rarity.common { background:#dfe9f3; color:#07172b; }
    .card-inner { height: 100%; display: flex; flex-direction: column; padding: 7px; }
    .card-art {
      flex: 1; margin-top: 20px; border: 3px solid #07172b; border-radius: 8px; position: relative; overflow: hidden;
      background: linear-gradient(145deg, var(--c1,#5ac8fa), var(--c2,#1f6fb2)); display: flex; flex-direction: column; justify-content: flex-end; min-height: 90px;
    }
    .card-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .art-overlay { position: relative; z-index: 3; padding: 5px 6px 7px; background: linear-gradient(transparent, rgba(7,23,43,.55) 35%, rgba(7,23,43,.9)); margin-top: auto; }
    .name { font-family:'Bangers',cursive; font-size:.95rem; line-height:1.04; color:#ffd23f; text-shadow:2px 2px 0 #07172b; }
    .card-foot { margin-top: 5px; border-top: 2px solid #07172b; padding-top: 5px; }
    .tagline { font-size:.62rem; color:#173a5c; line-height:1.2; font-style:italic; font-weight:800; }
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 3px 6px; margin-top: 5px; font-size:.52rem; color:#07172b; font-weight:800; }
    .stat-row { display:flex; align-items:center; gap:3px; }
    .stat-row span { min-width: 46px; }
    .stat-bar { flex:1; background:#dbe6f0; border:1px solid #07172b; height:6px; border-radius:3px; overflow:hidden; }
    .stat-fill { height:100%; background: linear-gradient(90deg,#5ac8fa,#ffd23f); }
    .back-note { color:#eaf6ff; font-size:.72rem; line-height:1.35; padding:6px 2px; text-align:center; }
    footer { text-align:center; padding:20px; font-size:.7rem; color:#9fc0dd; border-top:3px solid #ffd23f33; }
    @keyframes dealIn { from{opacity:0; transform:translateY(-40px) rotate(8deg);} to{opacity:1; transform:translateY(0) rotate(var(--rot,0deg));} }
    .card.deal-in { animation: dealIn .5s ease backwards; }
  </style>
</head>
<body>
  <div class="ray-top"></div>
  <header>
    <h1>CARDS OF HOPE</h1>
    <p class="sub" id="sub">a set made for someone</p>
  </header>
  <div class="controls">
    <button class="btn-deal" onclick="dealAll()">✨ DEAL THE SET</button>
    <button class="btn-deal" onclick="shuffleDeal()">🔀 SHUFFLE</button>
  </div>
  <p class="flip-hint">tap a card to flip it</p>
  <div class="hand" id="hand"></div>
  <footer>Cards of Hope · made on the fleet</footer>

  <script>
    let deck = [], statKeys = [];
    const COLORS = [['#5ac8fa','#1f6fb2'],['#ffd23f','#e07b00'],['#7ee787','#1f8f4e'],['#b794f6','#6b3fa0'],['#ff9aa2','#c0392b'],['#ffd6a5','#d98324']];

    async function loadDeck() {
      const r = await fetch('deck.hope.json?' + Date.now());
      const d = await r.json();
      deck = (d.cards || []).filter(c => !c.disabled);
      statKeys = d.stat_keys || [];
      const person = d.meta && d.meta.person && d.meta.person !== 'REPLACE_ME' ? d.meta.person : (d.meta ? d.meta.subtitle : '');
      if (person) document.getElementById('sub').textContent = person;
    }
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
    function statBar(v){ return `<div class="stat-bar"><div class="stat-fill" style="width:${Math.max(0,Math.min(100,v))}%"></div></div>`; }
    function statsHtml(card){
      return statKeys.map(k => `<span class="stat-row"><span>${esc(k.label)}</span>${statBar(card.stats?.[k.key] ?? 0)}</span>`).join('');
    }
    function frontHtml(card){
      const face = card.face || 'art/placeholder.svg';
      return `<img class="card-photo" src="${esc(face)}" alt="${esc(card.name)}" loading="lazy"
                onerror="this.style.display='none'">
              <div class="art-overlay"><div class="name">${esc(card.name)}</div></div>`;
    }
    function renderCard(card, idx){
      const [c1,c2] = COLORS[idx % COLORS.length];
      const rot = (Math.random()*7-3.5).toFixed(1);
      return `<div class="card deal-in" style="--rot:${rot}deg;--c1:${c1};--c2:${c2}"
                onclick='flip(this, ${JSON.stringify(card).replace(/"/g,"&quot;").replace(/'/g,"&#39;")})'>
        <span class="card-num">#${String(idx+1).padStart(2,'0')}</span>
        <span class="rarity ${esc(card.rarity||'common')}">${esc(card.rarity||'common')}</span>
        <div class="card-inner">
          <div class="card-art">${frontHtml(card)}</div>
          <div class="card-foot">
            <div class="tagline">${esc(card.tagline)}</div>
            <div class="stats">${statsHtml(card)}</div>
          </div>
        </div></div>`;
    }
    function flip(el, card){
      const art = el.querySelector('.card-art');
      const foot = el.querySelector('.card-foot');
      if (el.dataset.flipped){
        el.dataset.flipped=''; art.innerHTML=frontHtml(card); foot.style.display='';
      } else {
        el.dataset.flipped='1';
        art.innerHTML = `<div class="back-note">${esc(card.note||'')}</div>`;
        foot.style.display='none';
      }
    }
    function dealAll(){ const el=document.getElementById('hand'); el.innerHTML = deck.map((c,i)=>renderCard(c,i)).join(''); }
    function shuffleDeal(){ const el=document.getElementById('hand'); el.innerHTML = shuffle(deck).map((c,i)=>renderCard(c,i)).join(''); }
    loadDeck().then(dealAll);
  </script>
</body>
</html>
