<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3d2b1f">
  <title>Barn Board — Mark Yer Turf</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rye&family=IBM+Plex+Sans:wght@500;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: #120c08; color: #f4e4c1; min-height: 100dvh;
      padding: max(12px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom));
    }
    header { text-align: center; margin-bottom: 14px; }
    .badge { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: #c45c26; }
    h1 { font-family: 'Rye', serif; font-size: 1.5rem; color: #e8c547; margin: 6px 0; }
    .tag { font-size: 0.8rem; color: #a89070; line-height: 1.4; max-width: 22rem; margin: 0 auto; }
    .hero {
      background: #2a1f14; border: 3px solid #e8c547; border-radius: 16px;
      padding: 16px; text-align: center; margin-bottom: 14px; max-width: 26rem; margin-left: auto; margin-right: auto;
    }
    .hero b { display: block; font-size: 2.2rem; color: #7bed9f; font-weight: 800; }
    .hero span { font-size: 0.72rem; color: #9a8870; text-transform: uppercase; letter-spacing: 0.08em; }
    .grid { display: grid; gap: 10px; max-width: 26rem; margin: 0 auto; }
    .peg {
      padding: 22px 16px; border: none; border-radius: 16px; cursor: pointer;
      background: linear-gradient(145deg, #c45c26, #8b3a12); color: #fff;
      font-weight: 800; font-size: 1.15rem; text-align: left;
      box-shadow: 0 5px 0 #4a2010; -webkit-tap-highlight-color: transparent;
    }
    .peg:active { transform: translateY(3px); box-shadow: 0 2px 0 #4a2010; }
    .peg small { display: block; font-size: 0.72rem; font-weight: 500; opacity: 0.85; margin-top: 4px; }
    .msg { text-align: center; font-size: 0.9rem; color: #7bed9f; margin: 12px auto; max-width: 22rem; min-height: 1.2em; }
    .msg.bad { color: #ff6b6b; }
    .empty { text-align: center; color: #888; font-size: 0.85rem; padding: 24px; line-height: 1.45; }
    .links { text-align: center; margin-top: 16px; font-size: 0.72rem; color: #666; }
    .links a { color: #7bed9f; }
    .fine { font-size: 0.68rem; color: #555; text-align: center; margin-top: 10px; line-height: 1.4; max-width: 22rem; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <header>
    <p class="badge">The rednecks are just trying to help out</p>
    <h1>Barn Board</h1>
    <p class="tag">"did san fran-cisco have a human poo map? out here we do it country"</p>
  </header>

  <div class="hero">
    <b id="gallons">0</b>
    <span>gallons city water you kept</span>
  </div>

  <p class="msg" id="msg"></p>
  <div class="grid" id="grid"></div>
  <p class="fine">Tape a QR on the fridge from <a href="/turf/setup" style="color:#e8c547">setup</a> · each peg = 1.6 gal not flushed</p>
  <p class="links"><a href="/turf/setup">Setup pegs</a> · <a href="/turf">Map</a> · <a href="/">hitme</a></p>

  <script>
    const LS_KEY = 'turf_yard_id';
    const params = new URLSearchParams(location.search);
    let yardId = params.get('y') || localStorage.getItem(LS_KEY) || '';

    const msg = (t, bad) => {
      const el = document.getElementById('msg');
      el.textContent = t || '';
      el.className = bad ? 'msg bad' : 'msg';
    };

    function renderStats(s) {
      document.getElementById('gallons').textContent = (s.gallons_saved ?? 0).toLocaleString();
    }

    async function load() {
      if (!yardId) {
        document.getElementById('grid').innerHTML = '<div class="empty">No yard yet.<br><a href="/turf/setup" style="color:#e8c547">Setup once</a> — pound fence · plant pegs.<br>Then bookmark this barn board.</div>';
        return;
      }
      const r = await fetch('/api/turf/yard/' + encodeURIComponent(yardId));
      const d = await r.json();
      if (!d.ok) {
        document.getElementById('grid').innerHTML = '<div class="empty">Yard not found. <a href="/turf/setup" style="color:#e8c547">Setup again</a></div>';
        return;
      }
      renderStats(d.stats || {});
      const stations = d.yard.stations || [];
      const grid = document.getElementById('grid');
      if (!stations.length) {
        grid.innerHTML = '<div class="empty">No pegs planted.<br><a href="/turf/setup" style="color:#e8c547">Walk the yard once</a> and name the oak.</div>';
        return;
      }
      grid.innerHTML = stations.map(s => `
        <button type="button" class="peg" data-id="${s.id}">
          ${s.name}
          <small>I watered ${s.name.toLowerCase()}</small>
        </button>`).join('');
      grid.querySelectorAll('.peg').forEach(btn => {
        btn.onclick = async () => {
          const r2 = await fetch('/api/turf/peg', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ yard_id: yardId, station_id: btn.dataset.id })
          });
          const d2 = await r2.json();
          if (!d2.ok) { msg(d2.error || 'fail', true); return; }
          msg('+' + 1.6 + ' gal saved. Coons confused. Manhood intact.');
          renderStats(d2.stats);
        };
      });
    }

    load();
  </script>
</body>
</html>
