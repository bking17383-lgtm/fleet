<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2a1f0a">
  <title>Treasure Map — Piss Points</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rye&family=IBM+Plex+Sans:wght@500;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #1a1208; color: #f4e4c1; min-height: 100dvh; }
    header { text-align: center; padding: 10px 12px; background: linear-gradient(180deg,#4a3520,#1a1208); border-bottom: 3px dashed #e8c547; }
    .badge { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: #e8c547; }
    h1 { font-family: 'Rye', serif; font-size: 1.45rem; color: #ffd700; margin: 4px 0; }
    .tag { font-size: 0.78rem; color: #a89070; max-width: 24rem; margin: 0 auto; line-height: 1.35; }
    #map { height: 52vh; min-height: 260px; border-bottom: 3px solid #8b6914; filter: sepia(0.35) saturate(1.2); }
    .panel { padding: 12px; max-width: 28rem; margin: 0 auto; }
    .score { display: flex; gap: 8px; margin-bottom: 10px; }
    .score div { flex: 1; background: #2a2010; border: 2px solid #e8c547; border-radius: 12px; padding: 10px; text-align: center; }
    .score b { display: block; font-size: 1.4rem; color: #ffd700; }
    .score span { font-size: 0.65rem; color: #9a8870; text-transform: uppercase; }
    .spots { max-height: 28vh; overflow: auto; background: #120c08; border: 2px solid #5a4030; border-radius: 12px; padding: 8px; }
    .spot { display: flex; align-items: center; gap: 10px; padding: 8px 6px; border-bottom: 1px solid #2a2010; font-size: 0.85rem; }
    .spot:last-child { border: none; }
    .coin { width: 32px; height: 32px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff6b3, #e8c547 40%, #8b6914);
      color: #3d2b1f; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0;
      border: 2px solid #ffd700; box-shadow: 0 2px 0 #5a4030; }
    .spot small { color: #888; display: block; font-size: 0.7rem; }
    .empty { text-align: center; color: #888; padding: 20px; line-height: 1.5; }
    .empty a { color: #e8c547; }
    footer { text-align: center; font-size: 0.72rem; padding: 12px; color: #666; }
    footer a { color: #7bed9f; margin: 0 6px; }
    .leaflet-container { background: #3d4a28; font-family: inherit; }
    .treasure-fence { stroke-dasharray: 8 6; }
  </style>
</head>
<body>
  <header>
    <p class="badge">everyone sees the spots · treasure map</p>
    <h1>Piss Points Map</h1>
    <p class="tag">Gold dots = where someone watered the yard. Fence = yer treasure boundary. Each spot = 1.6 gal saved.</p>
  </header>
  <div id="map"></div>
  <div class="panel">
    <div class="score">
      <div><b id="pts">0</b><span>spots</span></div>
      <div><b id="gal">0</b><span>gallons</span></div>
      <div><b id="pegs">0</b><span>pegs</span></div>
    </div>
    <div class="spots" id="list"></div>
  </div>
  <footer>
    <a href="/turf/setup">setup fence</a>
    <a href="/turf/barn">barn board</a>
    <a href="/pee">pee timer</a>
    <a href="/turf/intro">how (dumb version)</a>
  </footer>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const LS_KEY = 'turf_yard_id';
    const params = new URLSearchParams(location.search);
    let yardId = params.get('y') || localStorage.getItem(LS_KEY) || '';
    let map, layer;

    function coinIcon(n) {
      return L.divIcon({
        className: '',
        html: `<div style="width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff6b3,#e8c547);border:2px solid #ffd700;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#3d2b1f;box-shadow:0 2px 4px rgba(0,0,0,.4)">${n}</div>`,
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
    }

    async function load() {
      const list = document.getElementById('list');
      if (!yardId) {
        document.getElementById('map').innerHTML = '';
        list.innerHTML = '<div class="empty">No yard yet.<br><a href="/turf/setup">Setup once</a> — then everyone with the link sees spots here.</div>';
        return;
      }
      const r = await fetch('/api/turf/yard/' + encodeURIComponent(yardId));
      const d = await r.json();
      if (!d.ok) {
        list.innerHTML = '<div class="empty">Yard not found. <a href="/turf/setup">Setup again</a></div>';
        return;
      }
      const y = d.yard;
      const marks = y.marks || [];
      const stats = d.stats || {};
      document.getElementById('pts').textContent = marks.length;
      document.getElementById('gal').textContent = (stats.gallons_saved ?? 0).toLocaleString();
      document.getElementById('pegs').textContent = (y.stations || []).length;

      list.innerHTML = marks.length ? marks.map((m, i) => `
        <div class="spot"><div class="coin">${i + 1}</div><div>
          <strong>${(m.label || 'Spot')}</strong> · +1.6 gal
          <small>${m.callsign || 'Anonymous'} · ${(m.at || '').slice(0, 16)}</small>
        </div></div>`).join('') : '<div class="empty">No spots yet. Mark turf or tap barn pegs.</div>';

      const center = marks.length ? [marks[marks.length - 1].lat, marks[marks.length - 1].lng]
        : (y.polygon && y.polygon[0]) ? y.polygon[0] : [37.77, -122.42];
      map = L.map('map', { zoomControl: true }).setView(center, 18);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      layer = L.layerGroup().addTo(map);

      if (y.polygon && y.polygon.length >= 3) {
        const ring = y.polygon.map(p => [p[0], p[1]]);
        L.polygon(ring, {
          color: '#ffd700', weight: 4, dashArray: '10 8', fillColor: '#e8c547', fillOpacity: 0.12,
          className: 'treasure-fence'
        }).bindPopup('Treasure fence — stay inside').addTo(layer);
        map.fitBounds(L.polygon(ring).getBounds(), { padding: [24, 24] });
      }
      (y.stations || []).forEach(s => {
        L.marker([s.lat, s.lng], { icon: L.divIcon({
          className: '', html: '<div style="font-size:22px">📍</div>', iconSize: [22, 22], iconAnchor: [11, 11]
        })}).bindPopup('Peg: ' + s.name).addTo(layer);
      });
      marks.forEach((m, i) => {
        L.marker([m.lat, m.lng], { icon: coinIcon(i + 1) })
          .bindPopup(`Spot #${i + 1}<br>${m.label || 'Turf'}<br>+1.6 gal`)
          .addTo(layer);
      });
    }
    load();
  </script>
</body>
</html>
